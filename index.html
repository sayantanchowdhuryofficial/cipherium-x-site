<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CipheriumX</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVIGATION BAR -->
    <nav class="navbar">
        <div class="nav-brand">CIPHERIUM<span>X</span></div>
        <div class="nav-links">
            <a href="#features">Features</a>
            <a href="#pricing">Pricing</a>
            <a href="#about">About</a>
        </div>
        <div class="nav-actions">
            <button class="btn btn-outline" id="loginBtn">Log In</button>
            <button class="btn btn-primary" id="signupBtn">Sign Up</button>
        </div>
    </nav>

    <!-- AUTHENTICATION MODAL -->
    <div id="authModal" class="modal-overlay hidden">
        <div class="modal-content glass-panel">
            <button class="close-modal" id="closeModal">&times;</button>
            
            <div class="modal-header">
                <h2 id="modalTitle">Welcome Back</h2>
                <p id="modalSubtitle">Log in to your CipheriumX account</p>
            </div>

            <div class="modal-body">
                <!-- Login Form -->
                <form id="loginForm" class="auth-form active-form">
                    <div class="input-group">
                        <label for="loginEmail">Email Address</label>
                        <input type="email" id="loginEmail" placeholder="you@example.com" required>
                    </div>
                    <div class="input-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                    </div>
                    <div class="form-options">
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary full-width">Sign In</button>
                    <p class="switch-form-text">Don't have an account? <a href="#" id="switchToSignup">Sign up</a></p>
                </form>

                <!-- Signup Form -->
                <form id="signupForm" class="auth-form">
                    <div class="input-group">
                        <label for="signupUsername">Username</label>
                        <input type="text" id="signupUsername" placeholder="cybersurfer99" required>
                    </div>
                    <div class="input-group">
                        <label for="signupEmail">Email Address</label>
                        <input type="email" id="signupEmail" placeholder="you@example.com" required>
                    </div>
                    <div class="input-group">
                        <label for="signupPassword">Password</label>
                        <input type="password" id="signupPassword" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary full-width">Create Account</button>
                    <p class="switch-form-text">Already have an account? <a href="#" id="switchToLogin">Log in</a></p>
                </form>
            </div>
        </div>
    </div>

    <div class="interactive-orb" id="glow-orb" style="width: 400px; height: 400px;"></div>
    <canvas id="bg-canvas"></canvas>

    <div class="hero-container">
        <div class="title-wrapper">
            <div class="glass-panel"></div>
            <h1 class="title">CIPHERIUM<span>X</span></h1>
        </div>
        <div class="subtitle">Next-Generation Intelligence</div>
    </div>

    <script src="script.js"></script>

</body>
</html>

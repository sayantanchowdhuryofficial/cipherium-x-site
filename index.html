<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CipheriumX</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-glow: #8a2be2;
            --secondary-glow: #00ffff;
            --bg-color: #030014;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-color);
            font-family: 'Orbitron', sans-serif;
            color: white;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .hero-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .title-wrapper {
            position: relative;
            padding: 2rem 4rem;
        }

        .title {
            font-size: clamp(3rem, 8vw, 8rem);
            font-weight: 900;
            letter-spacing: 12px;
            margin: 0;
            background: linear-gradient(135deg, #fff, #a5b4fc, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 0 20px rgba(138, 43, 226, 0.4));
            animation: pulse-glow 4s ease-in-out infinite alternate;
        }

        .title span {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            filter: drop-shadow(0 0 15px rgba(0, 242, 254, 0.6));
        }

        .subtitle {
            margin-top: 1rem;
            font-size: clamp(1rem, 2vw, 1.5rem);
            font-weight: 400;
            letter-spacing: 6px;
            color: #94a3b8;
            text-transform: uppercase;
            opacity: 0;
            animation: fade-in-up 1s ease-out 0.5s forwards;
            text-shadow: 0 0 10px rgba(148, 163, 184, 0.4);
        }

        .glass-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            z-index: -1;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(138, 43, 226, 0.1);
            opacity: 0;
            animation: fade-in 1.5s ease-out forwards;
        }

        .interactive-orb {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            opacity: 0.15;
            filter: blur(50px);
            pointer-events: none;
            z-index: 1;
            transition: opacity 0.2s ease-out;
        }

        @keyframes pulse-glow {
            0% { filter: drop-shadow(0 0 20px rgba(138, 43, 226, 0.4)); }
            100% { filter: drop-shadow(0 0 40px rgba(138, 43, 226, 0.8)); }
        }

        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="interactive-orb" id="glow-orb" style="width: 400px; height: 400px;"></div>
    <canvas id="bg-canvas"></canvas>

    <div class="hero-container">
        <div class="title-wrapper">
            <div class="glass-panel"></div>
            <h1 class="title">CIPHERIUM<span>X</span></h1>
        </div>
        <div class="subtitle">Next-Generation Intelligence</div>
    </div>

    <script>
        // Interactive glow orb following mouse
        const orb = document.getElementById('glow-orb');
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let orbX = mouseX;
        let orbY = mouseY;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animateOrb() {
            // Smooth follow interpolation
            orbX += (mouseX - orbX) * 0.05;
            orbY += (mouseY - orbY) * 0.05;
            orb.style.transform = `translate(${orbX - 200}px, ${orbY - 200}px)`;
            requestAnimationFrame(animateOrb);
        }
        animateOrb();

        // Advanced Cyber-Particles Animation
        const canvas = document.getElementById("bg-canvas");
        const ctx = canvas.getContext("2d");

        let width, height;
        let particles = [];
        const particleCount = Math.min(window.innerWidth / 5, 150);
        
        const colors = ['#8a2be2', '#00ffff', '#dddddd', '#4facfe'];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = []; // Re-initialize to avoid crowding
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        window.addEventListener("resize", resize);

        class Particle {
            constructor() {
                this.x = Math.random() * window.innerWidth;
                this.y = Math.random() * window.innerHeight;
                this.vx = (Math.random() - 0.5) * 1.0;
                this.vy = (Math.random() - 0.5) * 1.0;
                this.size = Math.random() * 2 + 0.5;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.life = Math.random() * Math.PI * 2;
                this.baseAlpha = Math.random() * 0.5 + 0.3;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Bounce off edges
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
                
                // Repel from mouse
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 150) {
                    const force = (150 - dist) / 150;
                    this.x -= (dx / dist) * force * 1.5;
                    this.y -= (dy / dist) * force * 1.5;
                }

                this.life += 0.02;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.baseAlpha + Math.sin(this.life) * 0.2;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        resize();

        function drawLines() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const p1 = particles[i];
                    const p2 = particles[j];
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        
                        // Use gradient for lines based on connecting particles
                        const gradient = ctx.createLinearGradient(p1.x, p1.y, p2.x, p2.y);
                        gradient.addColorStop(0, p1.color);
                        gradient.addColorStop(1, p2.color);
                        
                        ctx.strokeStyle = gradient;
                        // Calculate opacity based on distance
                        ctx.globalAlpha = 0.2 * (1 - dist / 120);
                        ctx.lineWidth = 1;
                        ctx.stroke();
                        ctx.globalAlpha = 1;
                    }
                }
            }
        }

        function animate() {
            // Dark trail effect for smooth motion blur
            ctx.fillStyle = "rgba(3, 0, 20, 0.2)";
            ctx.fillRect(0, 0, width, height);

            for (let p of particles) {
                p.update();
                p.draw();
            }
            
            drawLines();
            requestAnimationFrame(animate);
        }

        animate();
    </script>

    <script src="cursor.js"></script>

</body>
</html>
